<!DOCTYPE html>
<html>
<head>
    <title>Create Order</title>
    <link rel="stylesheet"
          href="../CSS/style.css">
</head>
<body>

<div class="container">

<h1>Create Order</h1>

<form id="orderForm">

<input
type="number"
id="customer_id"
placeholder="Customer ID"
required>

<input
type="text"
id="product_name"
placeholder="Product Name"
required>

<input
type="number"
id="quantity"
placeholder="Quantity"
required>

<textarea
id="delivery_address"
placeholder="Delivery Address">
</textarea>

<div class="form-group">
    <span class="field-title">Order Date</span>
    <input type="date" id="orderDate" required>
</div>

<div class="form-group">
    <span class="field-title">Delivery Date</span>
    <input type="date" id="deliveryDate" required>
</div>

<select id="status" placeholder="Select Status" required>
 <option  selected disabled>Select Status</option>
<option>Pending</option>
<option>Confirmed</option>
<option>Packed</option>
<option>Shipped</option>
<option>Delivered</option>
<option>Cancelled</option>

</select>

<button class="createbtn" type="submit">
Create Order
</button>

</form>

</div>

<script src="../javascript/createOrder.js"></script>

</body>
</html>
